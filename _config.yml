title: chickenprophecy
tagline: cracked HTB walkthroughs
description: >-
  Hack The Box walkthroughs and notes by chickenprophecy.
author: chickenprophecy
# IMPORTANT: when you deploy to GitHub Pages at username.github.io/REPO,
# set baseurl to "/REPO" (e.g. "/chickenprophecy"). If you use a user
# site at username.github.io with NO repo path, leave baseurl as "".
baseurl: "/blog"
url: "https://avrastefania.github.io"

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Build settings
plugins:
  - jekyll-feed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
